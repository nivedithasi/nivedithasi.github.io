<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Niveditha S. Iyer">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles/theme.css">

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            const theme = savedTheme === 'dark' || savedTheme === 'light' ? savedTheme : systemTheme;
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <title>Art | Niveditha Iyer</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --content-size: 1rem;
            --header-size: 1rem;
            --section-gap: 0.5rem;
            --nav-size: 0.85rem;
        }

        html,
        body {
            font-family: "Manrope", sans-serif;
            height: 100%;
            color: var(--color-text-strong);
            background-color: var(--color-page-bg);
        }

        body {
            display: flex;
            flex-direction: column;
            padding: 40px 20px 60px;
            margin-bottom: 40px;
            justify-content: flex-start;
            line-height: 1.6;
            opacity: 0;
            animation: fadeInPage 0.6s ease forwards;
        }

        @keyframes fadeInPage {
            to { opacity: 1; }
        }

        /* Nav */
        .site-nav {
            width: 60%;
            margin: 0 auto 10px auto;
            padding: 0 0 4px 0;
            font-family: "Manrope", sans-serif;
            font-size: var(--nav-size);
            letter-spacing: 0.03em;
            text-align: right;
        }

        .nav-link {
            color: var(--color-text-muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--color-text-strong);
        }

        .nav-separator {
            color: var(--color-nav-separator);
            margin: 0 8px;
        }

        .theme-toggle {
            background: none;
            border: 0;
            color: var(--color-text-muted);
            cursor: pointer;
            font: inherit;
            letter-spacing: inherit;
            padding: 0;
            transition: color 0.2s ease;
        }

        .theme-toggle:hover {
            color: var(--color-text-strong);
        }

        .art-header {
            width: 60%;
            margin: 0 auto 18px auto;
            text-align: left;
            font-size: var(--header-size);
        }

        .viewer {
            width: 60%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-bottom: 40px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .gallery-item {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            background: var(--color-card-bg);
            border: 1px solid var(--color-border-card);
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transition: transform 0.35s ease, filter 0.35s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.03);
            filter: saturate(1.05);
        }

        .empty-state {
            font-family: "EB Garamond", serif;
            color: var(--color-text-secondary);
            font-size: 1.05rem;
            padding: 24px 0;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            background: var(--color-lightbox-bg);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 24px;
        }

        .lightbox.visible {
            display: flex;
        }

        .lightbox-content {
            max-width: 90vw;
            max-height: 85vh;
            border-radius: 12px;
            overflow: hidden;
            background: var(--color-lightbox-panel);
            box-shadow: 0 20px 60px var(--color-shadow-lightbox);
        }

        .lightbox-content img {
            display: block;
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            transform-origin: center center;
            transition: transform 0.15s ease;
            cursor: zoom-in;
        }

        .lightbox-content img.zoomed {
            cursor: zoom-out;
        }

        .lightbox-caption {
            font-family: "EB Garamond", serif;
            font-size: 1rem;
            color: var(--color-lightbox-caption);
            text-align: center;
            margin-top: 12px;
        }

        @media (max-width: 1024px) {
            .site-nav,
            .art-header,
            .viewer,
            .site-footer {
                width: 95%;
            }
        }

        @media (max-width: 768px) {
            .site-nav,
            .art-header,
            .viewer,
            .site-footer {
                width: 100%;
            }

            .site-nav {
                text-align: right;
            }
        }

        .site-footer {
            width: 60%;
            margin: 2rem auto 2rem;
            text-align: right;
        }

        .footer-copyright {
            font-family: "EB Garamond", serif;
            font-size: 0.85rem;
            color: var(--color-text-muted);
        }

    </style>
</head>

<body>
    <div class="site-shell">
        <aside class="drawing-panel" aria-label="Page illustration">
            <div class="drawing-stack">
                <img class="drawing-goose drawing-goose-large" src="assets/geese/transparent/paint.png" alt="">
            </div>
        </aside>

        <main class="site-content">
            <nav class="site-nav">
                <a href="/" class="nav-link">Home</a>
                <span class="nav-separator">/</span>
                <a href="/writing.html" class="nav-link">Writing</a>
                <span class="nav-separator">/</span>
                <a href="/art.html" class="nav-link active">Art</a>
                <button class="theme-toggle" type="button" aria-label="Toggle dark mode">
                    <span class="theme-toggle-icon theme-toggle-sun" aria-hidden="true">☀</span>
                    <span class="theme-toggle-icon theme-toggle-moon" aria-hidden="true">☾</span>
                    <span class="theme-toggle-label">Toggle color theme</span>
                </button>
            </nav>

            <!-- <div class="art-header">
                Art
            </div> -->

            <div class="viewer">
                <div id="gallery" class="gallery"></div>
                <div id="empty-state" class="empty-state" style="display: none;">
                    Add image filenames to `assets/art/index.json` to populate this gallery.
                </div>
            </div>

            <div class="site-footer">
                <p class="footer-copyright">© 2026 Niveditha S. Iyer</p>
            </div>
        </main>
    </div>

    <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="lightbox-wrap">
            <div class="lightbox-content">
                <img id="lightbox-image" alt="">
            </div>
            <div id="lightbox-caption" class="lightbox-caption"></div>
        </div>
    </div>

    <script>
        function setupThemeToggle() {
            const button = document.querySelector('.theme-toggle');
            const media = window.matchMedia('(prefers-color-scheme: dark)');

            function effectiveTheme() {
                return document.documentElement.getAttribute('data-theme') || 'light';
            }

            function updateButton() {
                const isDark = effectiveTheme() === 'dark';
                button.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
                button.setAttribute('aria-pressed', String(isDark));
            }

            button.addEventListener('click', () => {
                const nextTheme = effectiveTheme() === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', nextTheme);
                localStorage.setItem('theme', nextTheme);
                updateButton();
            });

            media.addEventListener('change', () => {
                if (!localStorage.getItem('theme')) {
                    document.documentElement.setAttribute('data-theme', media.matches ? 'dark' : 'light');
                    updateButton();
                }
            });

            updateButton();
        }

        const gallery = document.getElementById('gallery');
        const emptyState = document.getElementById('empty-state');
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightbox-image');
        const lightboxCaption = document.getElementById('lightbox-caption');

        let zoomLevel = 1;
        const minZoom = 1;
        const maxZoom = 3;

        function applyZoom() {
            lightboxImage.style.transform = `scale(${zoomLevel})`;
            if (zoomLevel > 1) {
                lightboxImage.classList.add('zoomed');
            } else {
                lightboxImage.classList.remove('zoomed');
            }
        }

        function resetZoom() {
            zoomLevel = 1;
            applyZoom();
        }

        function openLightbox(src, caption) {
            lightboxImage.src = src;
            lightboxImage.alt = caption || 'Artwork';
            lightboxCaption.textContent = caption || '';
            lightbox.classList.add('visible');
            lightbox.setAttribute('aria-hidden', 'false');
            resetZoom();
        }

        function closeLightbox() {
            lightbox.classList.remove('visible');
            lightbox.setAttribute('aria-hidden', 'true');
            lightboxImage.src = '';
            resetZoom();
        }

        lightbox.addEventListener('click', (event) => {
            if (event.target === lightbox) {
                closeLightbox();
            }
        });

        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeLightbox();
            }
        });

        lightboxImage.addEventListener('click', () => {
            zoomLevel = zoomLevel > 1 ? 1 : 2;
            applyZoom();
        });

        lightboxImage.addEventListener('wheel', (event) => {
            event.preventDefault();
            const delta = Math.sign(event.deltaY);
            const step = 0.2;
            zoomLevel = Math.min(maxZoom, Math.max(minZoom, zoomLevel - delta * step));
            applyZoom();
        }, { passive: false });

        function artAssetPath(value) {
            if (typeof value !== 'string') return '';

            const trimmed = value.trim();
            if (!trimmed || trimmed.includes('..') || trimmed.startsWith('//') || /^[a-z][a-z0-9+.-]*:/i.test(trimmed)) {
                return '';
            }

            return trimmed.startsWith('assets/') ? trimmed : `assets/art/${trimmed}`;
        }

        setupThemeToggle();

        fetch('assets/art/index.json')
            .then((res) => res.json())
            .then((items) => {
                const list = Array.isArray(items) ? items : [];
                if (list.length === 0) {
                    emptyState.style.display = 'block';
                    return;
                }

                list.forEach((item) => {
                    const entry = typeof item === 'string'
                        ? { src: artAssetPath(item), preview: artAssetPath(item), title: '' }
                        : {
                            src: artAssetPath(item.src),
                            preview: item.preview
                                ? artAssetPath(item.preview)
                                : artAssetPath(item.src),
                            title: item.title || item.caption || ''
                        };

                    if (!entry.src || !entry.preview) return;

                    const card = document.createElement('div');
                    card.className = 'gallery-item';
                    const image = document.createElement('img');
                    image.src = entry.preview;
                    image.alt = entry.title || 'Artwork';
                    card.appendChild(image);
                    card.addEventListener('click', () => openLightbox(entry.src, entry.title));
                    gallery.appendChild(card);
                });
            })
            .catch(() => {
                emptyState.style.display = 'block';
            });
    </script>
    <script src="/assets/scripts/visit-tracker.js" defer></script>
</body>

</html>
