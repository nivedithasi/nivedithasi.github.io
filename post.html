<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Niveditha S. Iyer">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles/theme.css">

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            const theme = savedTheme === 'dark' || savedTheme === 'light' ? savedTheme : systemTheme;
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Code syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <title id="page-title">Writing | Niveditha Iyer</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --main-header-size: 1.5rem;
            --content-size: 1.08rem;
            --header-size: 2rem;
            --section-gap: 0.5rem;
            --nav-size: 0.85rem;
        }

        html,
        body {
            font-family: "Manrope", sans-serif;
            height: 100%;
            color: var(--color-text-strong);
            background-color: var(--color-page-bg);
        }

        body {
            display: flex;
            flex-direction: column;
            padding: 40px 20px 60px;
            margin-bottom: 40px;
            justify-content: flex-start;
            line-height: 1.6;
            font-size: var(--content-size);
            opacity: 0;
            animation: fadeInPage 0.6s ease forwards;
        }

        @keyframes fadeInPage {
            to { opacity: 1; }
        }

        /* Nav */
        .site-nav {
            width: 60%;
            margin: 0 auto 10px auto;
            padding: 0 0 4px 0;
            font-family: "Manrope", sans-serif;
            font-size: var(--nav-size);
            letter-spacing: 0.03em;
            text-align: right;
        }

        .nav-link {
            color: var(--color-text-muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--color-text-strong);
        }

        .nav-separator {
            color: var(--color-nav-separator);
            margin: 0 8px;
        }

        .theme-toggle {
            background: none;
            border: 0;
            color: var(--color-text-muted);
            cursor: pointer;
            font: inherit;
            letter-spacing: inherit;
            padding: 0;
            transition: color 0.2s ease;
        }

        .theme-toggle:hover {
            color: var(--color-text-strong);
        }

        /* Post article */
        .post {
            width: 60%;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.6s ease 0.1s, transform 0.6s ease 0.1s;
        }

        .post.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Markdown rendered content */
        .post h1 {
            font-family: "Manrope", sans-serif;
            font-size: var(--header-size);
            font-weight: 600;
            color: var(--color-text-strong);
            letter-spacing: 0.02em;
            line-height: 1.6;
            margin: 0 0 10px 0;
        }

        .post h1 + p {
            margin-top: 24px;
        }

        .post h2 {
            font-family: "EB Garamond", serif;
            font-size: var(--content-size);
            color: var(--color-text-secondary);
            font-weight: 400;
            font-style: normal;
            line-height: 1.6;
            margin-top: 28px;
            margin-bottom: 0;
        }

        .post h2::before {
            content: "✦  ·  ✦  ·  ✦";
            display: block;
            text-align: center;
            color: var(--color-nav-separator);
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            margin-bottom: 28px;
        }

        .post h2::after {
            content: "✦  ·  ✦  ·  ✦";
            display: block;
            text-align: center;
            color: var(--color-nav-separator);
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            margin-top: 28px;
            margin-bottom: 28px;
        }

        .post h3 {
            font-family: "Manrope", sans-serif;
            font-size: var(--content-size);
            color: var(--color-text-body);
            font-weight: 600;
            line-height: 1.3;
            margin-top: 2em;
            margin-bottom: 0.5em;
        }

        .post h4 {
            font-family: "Manrope", sans-serif;
            font-size: var(--header-size);
            color: var(--color-text-subtle);
            line-height: 1.3;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }

        .post p {
            font-family: "EB Garamond", serif;
            font-size: var(--content-size);
            color: var(--color-text-article);
            line-height: 1.75;
            margin-bottom: 1.2em;
        }

        .post a {
            color: var(--color-accent);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
        }

        .post a:hover {
            border-bottom-color: var(--color-accent);
        }

        /* Script tables */
        .post table.script-table {
            width: 90%;
            border-collapse: collapse;
            font-family: "EB Garamond", serif;
            font-size: inherit;
            color: var(--color-text-article);
            margin: 1.2em auto;
            line-height: 1.75;
        }

        .post table.script-table td {
            vertical-align: top;
            padding: 0.1em 0;
            font-family: inherit;
        }

        .post table.script-table .speaker {
            width: 6rem;
            font-weight: 600;
            color: var(--color-text-secondary);
            padding-right: 0.6rem;
            white-space: nowrap;
        }

        .post table.script-table .line {
            width: auto;
        }

        /* Blockquotes */
        .post blockquote {
            border-left: 3px solid var(--color-accent);
            margin: 1.5em 0;
            padding: 0.5em 0 0.5em 1.5em;
            background-color: var(--color-quote-bg);
            border-radius: 0 4px 4px 0;
        }

        .post blockquote p {
            color: var(--color-text-secondary);
            font-style: normal;
            margin-bottom: 0.5em;
        }

        .post blockquote p:last-child {
            margin-bottom: 0;
        }

        /* Code */
        .post pre {
            background-color: var(--color-code-bg);
            border: 1px solid var(--color-border);
            border-radius: 6px;
            padding: 16px 20px;
            overflow-x: auto;
            margin: 1.5em 0;
        }

        .post code {
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            font-size: 0.9rem;
        }

        .post p code,
        .post li code {
            background-color: var(--color-code-bg);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.85em;
        }

        .hljs {
            color: var(--color-text-body);
            background: transparent;
        }

        .hljs-comment,
        .hljs-quote {
            color: var(--color-text-muted);
        }

        .hljs-keyword,
        .hljs-selector-tag,
        .hljs-subst {
            color: var(--color-code-keyword);
        }

        .hljs-string,
        .hljs-title,
        .hljs-name,
        .hljs-type,
        .hljs-attribute,
        .hljs-symbol,
        .hljs-bullet,
        .hljs-built_in,
        .hljs-addition,
        .hljs-variable,
        .hljs-template-tag,
        .hljs-template-variable {
            color: var(--color-code-string);
        }

        .hljs-number,
        .hljs-literal,
        .hljs-deletion {
            color: var(--color-code-number);
        }

        /* Lists */
        .post ul,
        .post ol {
            font-family: "EB Garamond", serif;
            font-size: var(--content-size);
            color: var(--color-text-article);
            line-height: 1.75;
            margin: 1em 0 1em 1.5em;
        }

        /* Make citations list wider */
        .post h4 + ol {
            width: 120%;
            margin-left: -10%;
        }

        .post li {
            margin-bottom: 0.4em;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .post li a {
            word-break: break-all;
        }

        /* Images */
        .post img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            margin: 1.5em 0;
        }

        /* Drop cap */
        .post p.dropcap::first-letter {
            font-family: "EB Garamond", serif;
            font-size: 3.5em;
            float: left;
            line-height: 0.8;
            margin-right: 8px;
            margin-top: 6px;
            color: var(--color-text-strong);
            font-weight: 600;
        }

        /* Citations */
        .cite-ref {
            font-size: 0.75em;
            vertical-align: super;
            line-height: 0;
            color: var(--color-accent);
            font-weight: 600;
            cursor: pointer;
            font-family: "Manrope", sans-serif;
            padding: 0 1px;
        }

        .cite-ref:hover {
            color: var(--color-accent-hover);
        }

        .cite-sep {
            font-size: 0.75em;
            vertical-align: super;
            line-height: 0;
            color: var(--color-text-muted);
        }

        .cite-tooltip {
            position: fixed;
            max-width: 360px;
            padding: 12px 16px;
            background: var(--color-tooltip-bg);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            box-shadow: 0 4px 16px var(--color-shadow-tooltip);
            font-size: var(--content-size);
            line-height: 1.5;
            color: var(--color-text-body);
            font-family: "EB Garamond", serif;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .cite-tooltip.visible {
            opacity: 1;
        }

        .cite-tooltip a {
            color: var(--color-accent);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
        }

        .cite-tooltip a:hover {
            border-bottom-color: var(--color-accent);
        }

        /* Section separators */
        .section-sep {
            text-align: center;
            color: var(--color-nav-separator);
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            margin: 2em 0;
            font-family: "Manrope", sans-serif;
        }

        /* Horizontal rules */
        .post hr {
            border: none;
            border-top: 1px solid var(--color-border);
            margin: 2em 0;
        }

        /* Post footer */
        .post-footer {
            width: 60%;
            margin: 0px auto 60px auto;
            opacity: 0;
            transition: opacity 0.6s ease 0.3s;
            padding-bottom: 40px;
        }

        .post-footer.visible {
            opacity: 1;
        }

        .back-link {
            font-family: "Manrope", sans-serif;
            font-size: var(--nav-size);
            color: var(--color-text-muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--color-accent);
        }

        .footer-copyright {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            margin-top: 12px;
            text-align: right;
        }

        /* Loading state */
        .post-loading {
            font-family: "EB Garamond", serif;
            font-size: var(--content-size);
            color: var(--color-text-muted);
            font-style: italic;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .site-nav,
            .post,
            .post-footer {
                width: 95%;
            }
        }

        @media (max-width: 768px) {
            .site-nav,
            .post,
            .post-footer {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .site-nav,
            .post,
            .post-footer {
                width: 100%;
            }

            .post pre {
                padding: 12px;
                font-size: 0.8rem;
            }

            .cite-tooltip {
                max-width: 280px;
                font-size: var(--content-size);
            }
        }
    </style>
</head>

<body>
    <div class="site-shell">
        <aside class="drawing-panel" aria-label="Page illustration">
            <div class="drawing-stack">
                <img class="drawing-goose drawing-goose-tiny" src="assets/geese/transparent/read.png" alt="">
            </div>
        </aside>

        <main class="site-content">
            <nav class="site-nav">
                <a href="/" class="nav-link">Home</a>
                <span class="nav-separator">/</span>
                <a href="/writing.html" class="nav-link active">Writing</a>
                <span class="nav-separator">/</span>
                <a href="/art.html" class="nav-link">Art</a>
                <button class="theme-toggle" type="button" aria-label="Toggle dark mode">
                    <span class="theme-toggle-icon theme-toggle-sun" aria-hidden="true">☀</span>
                    <span class="theme-toggle-icon theme-toggle-moon" aria-hidden="true">☾</span>
                    <span class="theme-toggle-label">Toggle color theme</span>
                </button>
            </nav>

            <article class="post" id="post-content">
                <p class="post-loading">Loading...</p>
            </article>

            <div class="post-footer" id="post-footer">
                <a href="/writing.html" class="back-link">&larr; Back to Writing</a>
                <p class="footer-copyright">© 2026 Niveditha S. Iyer</p>
            </div>
        </main>
    </div>

    <script>
        function setupThemeToggle() {
            const button = document.querySelector('.theme-toggle');
            const media = window.matchMedia('(prefers-color-scheme: dark)');

            function effectiveTheme() {
                return document.documentElement.getAttribute('data-theme') || 'light';
            }

            function updateButton() {
                const isDark = effectiveTheme() === 'dark';
                button.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
                button.setAttribute('aria-pressed', String(isDark));
            }

            button.addEventListener('click', () => {
                const nextTheme = effectiveTheme() === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', nextTheme);
                localStorage.setItem('theme', nextTheme);
                updateButton();
            });

            media.addEventListener('change', () => {
                if (!localStorage.getItem('theme')) {
                    document.documentElement.setAttribute('data-theme', media.matches ? 'dark' : 'light');
                    updateButton();
                }
            });

            updateButton();
        }

        async function loadPost() {
            var params = new URLSearchParams(window.location.search);
            var slug = params.get('slug');

            if (!slug) {
                document.getElementById('post-content').innerHTML = '<p>Post not found.</p>';
                return;
            }

            try {
                var metaResponse = await fetch('/blogs/index.json');
                var posts = await metaResponse.json();
                var postMeta = posts.find(function(p) { return p.slug === slug; });

                if (postMeta) {
                    document.getElementById('page-title').textContent =
                        postMeta.title + ' | Niveditha Iyer';
                }

                var mdResponse = await fetch('/blogs/' + encodeURIComponent(slug) + '.md');
                if (!mdResponse.ok) throw new Error('Post not found');
                var markdown = await mdResponse.text();

                var citeList = [null];
                var markdownBody = markdown;
                var citeSplit = markdown.split(/\n\[citations\]\s*\n/);
                if (citeSplit.length > 1) {
                    markdownBody = citeSplit[0];
                    var lines = citeSplit[1].split('\n');
                    lines.forEach(function(line) {
                        var m = line.match(/^\[(\d+)\]\s+(.+)/);
                        if (m) citeList[parseInt(m[1])] = m[2].trim();
                    });
                }

                markdownBody = markdownBody.replace(/\[(\d+(?:,\s*\d+)*)\]/g, function(match, inner) {
                    var nums = inner.split(/,\s*/);
                    var allValid = nums.every(function(n) { return citeList[parseInt(n)]; });
                    if (!allValid) return match;
                    return nums.map(function(n) {
                        return '<sup class="cite-ref" data-cite="' + n.trim() + '">' + n.trim() + '</sup>';
                    }).join('<sup class="cite-sep">,</sup>');
                });

                marked.setOptions({
                    gfm: true,
                    breaks: false,
                    highlight: function(code, lang) {
                        if (lang && hljs.getLanguage(lang)) {
                            return hljs.highlight(code, { language: lang }).value;
                        }
                        return hljs.highlightAuto(code).value;
                    }
                });

                var postEl = document.getElementById('post-content');
                postEl.innerHTML = marked.parse(markdownBody);

                postEl.querySelectorAll('p').forEach(function(p) {
                    if (p.textContent.indexOf('{dc}') === 0) {
                        p.innerHTML = p.innerHTML.replace('{dc}', '');
                        p.classList.add('dropcap');
                    }
                });

                postEl.querySelectorAll('p').forEach(function(p) {
                    if (p.textContent.trim() === '{sep}') {
                        var sep = document.createElement('div');
                        sep.className = 'section-sep';
                        sep.textContent = '✦  ·  ✦';
                        p.parentNode.replaceChild(sep, p);
                    }
                });

                if (citeList.length > 1) {
                    setupCiteTooltip(citeList);
                }

                requestAnimationFrame(function() {
                    postEl.classList.add('visible');
                    document.getElementById('post-footer').classList.add('visible');
                });

            } catch (err) {
                document.getElementById('post-content').innerHTML =
                    '<p>Sorry, this post could not be loaded.</p>';
                document.getElementById('post-footer').classList.add('visible');
            }
        }

        function setupCiteTooltip(citeList) {
            var tooltip = document.createElement('div');
            tooltip.className = 'cite-tooltip';
            document.body.appendChild(tooltip);
            var isPinned = false;

            function showAt(ref) {
                var num = parseInt(ref.getAttribute('data-cite'));
                if (!citeList[num]) return;

                var citationText = citeList[num];
                var displayText = citationText.replace(/(https?:\/\/[^\s]+)/g, '').trim();
                var html = marked.parse(displayText);

                tooltip.innerHTML = html;
                tooltip.style.left = '-9999px';
                tooltip.style.top = '-9999px';
                tooltip.classList.add('visible');

                var rect = ref.getBoundingClientRect();
                var tw = tooltip.offsetWidth;
                var th = tooltip.offsetHeight;

                var left = rect.left + rect.width / 2 - tw / 2;
                left = Math.max(8, Math.min(left, window.innerWidth - tw - 8));

                var top = rect.top - th - 8;
                if (top < 8) top = rect.bottom + 8;

                tooltip.style.left = left + 'px';
                tooltip.style.top = top + 'px';
            }

            function hide() {
                tooltip.classList.remove('visible');
                isPinned = false;
            }

            document.addEventListener('mouseover', function(e) {
                if (isPinned) return;
                var ref = e.target.closest('.cite-ref');
                if (ref) showAt(ref);
            });

            document.addEventListener('mouseout', function(e) {
                if (isPinned) return;
                var ref = e.target.closest('.cite-ref');
                if (ref) hide();
            });

            document.addEventListener('click', function(e) {
                var ref = e.target.closest('.cite-ref');
                var link = e.target.closest('a');

                if (ref) {
                    e.preventDefault();
                    var num = parseInt(ref.getAttribute('data-cite'));
                    var citationText = citeList[num];
                    var urlMatch = citationText.match(/(https?:\/\/[^\s]+)/);

                    if (urlMatch && urlMatch[1]) {
                        window.open(urlMatch[1], '_blank');
                    } else {
                        if (isPinned) {
                            hide();
                        } else {
                            showAt(ref);
                            isPinned = true;
                        }
                    }
                } else if (link && tooltip.contains(link)) {
                } else if (!tooltip.contains(e.target)) {
                    hide();
                }
            });
        }

        setupThemeToggle();
        loadPost();
    </script>
</body>

</html>
